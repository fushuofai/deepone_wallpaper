<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色壁纸 - DeepOne</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="page-top">
      <a href="index.html" class="back-link">&larr; 返回</a>
    </div>
    <div class="char-header">
      <img id="charAvatar" src="" alt="" class="char-avatar-large">
      <h1 id="charName">加载中...</h1>
    </div>

    <div class="search-section">
      <div class="search-box">
        <input type="text" id="wallpaperSearch" placeholder="搜索壁纸编号..." oninput="searchWallpapers()">
        <button onclick="searchWallpapers()" class="btn-search">搜索</button>
      </div>
      <button onclick="showAdminModal('wallpaper')" class="btn-create">+ 新建壁纸</button>
    </div>

    <div id="wallpaperGrid" class="wallpaper-grid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 管理员密码弹窗 -->
  <div id="adminModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('adminModal')">&times;</span>
      <h3 id="modalTitle">管理员验证</h3>
      <div class="form-group">
        <label>请输入管理员密码</label>
        <input type="password" id="adminPassword" placeholder="输入密码">
      </div>
      <button onclick="confirmAdmin()" class="btn-confirm">确认</button>
    </div>
  </div>

  <!-- 新建壁纸弹窗 -->
  <div id="wallpaperModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('wallpaperModal')">&times;</span>
      <h3>新建壁纸</h3>
      <div class="form-group">
        <label>壁纸编号</label>
        <input type="text" id="wallpaperId" placeholder="请输入壁纸编号">
      </div>
      <div class="form-group">
        <label>壁纸图片</label>
        <input type="file" id="wallpaperImage" accept="image/*">
      </div>
      <div class="form-group">
        <label>.lpk 下载链接</label>
        <input type="text" id="wallpaperLink" placeholder="请输入.lpk文件下载链接">
      </div>
      <button onclick="createWallpaper()" class="btn-confirm">创建</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
