<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepOne 壁纸分享</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>DeepOne 壁纸</h1>
      <p class="subtitle">发现并收藏你喜爱的角色壁纸</p>
    </header>

    <div class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索角色名称或壁纸编号..." oninput="handleSearch()">
        <button onclick="handleSearch()" class="btn-search">搜索</button>
      </div>
    </div>

    <div id="characterGrid" class="character-grid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
